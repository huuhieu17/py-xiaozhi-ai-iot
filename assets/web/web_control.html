<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xiaozhi Web Control</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; max-width: 820px; }
    h2 { margin-top: 24px; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    input[type=text], input[type=number] { flex: 1; padding: 8px; min-width: 260px; }
    button { padding: 8px 14px; cursor: pointer; }
    pre { background: #111; color: #ddd; padding: 12px; border-radius: 6px; overflow: auto; max-height: 360px; }
    #status { background: #f6f6f6; padding: 10px; border-radius: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Xiaozhi Web Control</h1>
  <div id="status">Đang tải trạng thái...</div>

  <h2>Hỏi AI</h2>
  <div class="row">
    <input id="askText" type="text" placeholder="Nhập câu hỏi..." />
    <button onclick="askAI()">Gửi</button>
  </div>

  <h2>Mở nhạc</h2>
  <div class="row">
    <input id="songName" type="text" placeholder="Tên bài hát" />
    <button onclick="playMusic()">Mở nhạc</button>
    <button onclick="toggleMusic()">Play/Pause</button>
    <button onclick="stopMusic()">Stop</button>
  </div>

  <h2>Âm lượng</h2>
  <div class="row">
    <button onclick="changeVolume(-10)">-10</button>
    <input id="volumeSlider" type="range" min="0" max="100" value="70" style="flex: 1; min-width: 220px;" oninput="onVolumeSliderInput(this.value)" onchange="setVolume(this.value)" />
    <button onclick="changeVolume(10)">+10</button>
    <button onclick="muteVolume()">Mute</button>
    <button onclick="unmuteVolume()">Unmute</button>
    <span id="volumeLabel">70%</span>
  </div>

  <h2>Logs</h2>
  <div class="row">
    <input id="logLines" type="number" min="10" max="2000" value="200" />
    <button onclick="loadLogs()">Tải log</button>
  </div>
  <pre id="logs">Chưa tải logs...</pre>

  <h2>Restart</h2>
  <div class="row">
    <button onclick="restartApp()">Restart ứng dụng</button>
  </div>

  <script>
    (function () {
      async function callApi(url, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(url, options);
        const data = await res.json().catch(() => ({ ok: false, error: 'Invalid response' }));
        if (!res.ok) throw new Error(data.error || res.statusText || 'Request failed');
        return data;
      }

      window.refreshStatus = async function () {
        try {
          const data = await callApi('/api/status');
          document.getElementById('status').innerText = JSON.stringify(data, null, 2);
          await window.refreshVolume();
        } catch (e) {
          document.getElementById('status').innerText = 'Lỗi status: ' + e.message;
        }
      };

      window.onVolumeSliderInput = function (value) {
        document.getElementById('volumeLabel').innerText = String(value) + '%';
      };

      window.refreshVolume = async function () {
        try {
          const data = await callApi('/api/volume');
          if (typeof data.volume === 'number') {
            const volume = Math.max(0, Math.min(100, Math.round(data.volume)));
            document.getElementById('volumeSlider').value = volume;
            window.onVolumeSliderInput(volume);
          }
        } catch (e) {
          // Không chặn UI nếu thiết bị không hỗ trợ điều khiển âm lượng
        }
      };

      window.setVolume = async function (value) {
        const volume = Math.max(0, Math.min(100, Number(value)));
        try {
          const data = await callApi('/api/volume', 'POST', { volume });
          if (typeof data.volume === 'number') {
            const realVolume = Math.max(0, Math.min(100, Math.round(data.volume)));
            document.getElementById('volumeSlider').value = realVolume;
            window.onVolumeSliderInput(realVolume);
          } else {
            window.onVolumeSliderInput(volume);
          }
        } catch (e) {
          alert('Lỗi chỉnh âm lượng: ' + e.message);
          await window.refreshVolume();
        }
      };

      window.changeVolume = async function (delta) {
        const slider = document.getElementById('volumeSlider');
        const current = Number(slider.value || 0);
        const target = Math.max(0, Math.min(100, current + Number(delta || 0)));
        slider.value = target;
        window.onVolumeSliderInput(target);
        await window.setVolume(target);
      };

      window.muteVolume = async function () {
        try {
          const data = await callApi('/api/volume/mute', 'POST');
          if (typeof data.volume === 'number') {
            document.getElementById('volumeSlider').value = data.volume;
            window.onVolumeSliderInput(data.volume);
          }
        } catch (e) {
          alert('Lỗi mute: ' + e.message);
        }
      };

      window.unmuteVolume = async function () {
        try {
          const data = await callApi('/api/volume/unmute', 'POST');
          if (typeof data.volume === 'number') {
            document.getElementById('volumeSlider').value = data.volume;
            window.onVolumeSliderInput(data.volume);
          }
        } catch (e) {
          alert('Lỗi unmute: ' + e.message);
        }
      };

      window.askAI = async function () {
        const text = document.getElementById('askText').value.trim();
        if (!text) return;
        try {
          const data = await callApi('/api/ask', 'POST', { text });
          alert(data.message || 'Đã gửi câu hỏi');
        } catch (e) {
          alert('Lỗi hỏi AI: ' + e.message);
        }
      };

      window.playMusic = async function () {
        const song_name = document.getElementById('songName').value.trim();
        if (!song_name) return;
        try {
          const data = await callApi('/api/music/play', 'POST', { song_name });
          alert(data.message || 'Đã xử lý mở nhạc');
          await window.refreshStatus();
        } catch (e) {
          alert('Lỗi mở nhạc: ' + e.message);
        }
      };

      window.toggleMusic = async function () {
        try {
          const data = await callApi('/api/music/toggle', 'POST');
          alert(data.message || 'Đã toggle nhạc');
          await window.refreshStatus();
        } catch (e) {
          alert('Lỗi toggle nhạc: ' + e.message);
        }
      };

      window.stopMusic = async function () {
        try {
          const data = await callApi('/api/music/stop', 'POST');
          alert(data.message || 'Đã dừng nhạc');
          await window.refreshStatus();
        } catch (e) {
          alert('Lỗi dừng nhạc: ' + e.message);
        }
      };

      window.loadLogs = async function () {
        const lines = Number(document.getElementById('logLines').value || 200);
        try {
          const data = await callApi('/api/logs?lines=' + encodeURIComponent(lines));
          document.getElementById('logs').innerText = (data.lines || []).join('\n');
        } catch (e) {
          document.getElementById('logs').innerText = 'Lỗi tải logs: ' + e.message;
        }
      };

      window.restartApp = async function () {
        if (!confirm('Bạn chắc chắn muốn restart ứng dụng?')) return;
        try {
          const data = await callApi('/api/restart', 'POST');
          alert(data.message || 'Đang restart');
        } catch (e) {
          alert('Lỗi restart: ' + e.message);
        }
      };

      window.refreshStatus();
      window.refreshVolume();
      window.loadLogs();
      setInterval(window.refreshStatus, 4000);
    })();
  </script>
</body>
</html>
